<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Form state</title>
</head>
<body>
<form>
<input id="name" type="text" persist value="default">
<input id="subscribe" type="checkbox" persist>
<input id="plan-basic" type="radio" name="plan" persist checked>
<input id="plan-pro" type="radio" name="plan" persist>
<select id="color" persist>
<option value="red" selected>Red</option>
<option value="green">Green</option>
</select>
<textarea id="bio" persist>original</textarea>
</form>
</body>
</html>
