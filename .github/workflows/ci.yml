name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Pinned Chromium for the byte-exact conformance goldens. The version is
      # locked by playwright in package.json, so CI and local produce the same bytes.
      - name: Install pinned Chromium
        run: npx playwright install --with-deps chromium
      - name: Unit tests (jest)
        run: npm test
      - name: Conformance byte gate (web-test-runner)
        run: npm run test:conformance
